name: Deploy to k3s

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [master]

# Only trigger if docker-build succeeded
concurrency:
  group: k3s-deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/erpnext-scripts
  K3S_API_HOST: ${{ secrets.K3S_API_HOST }}

jobs:
  deploy:
    name: Deploy to on-premise k3s
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout scripts app
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure SSH to bastion
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K3S_SSH_KEY }}" > ~/.ssh/k3s_deploy_key
          chmod 600 ~/.ssh/k3s_deploy_key
          ssh-keyscan -H "${{ secrets.K3S_BASTION }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fetch kubeconfig via bastion
        run: |
          # SSH to bastion, sudo to read k3s.yaml, rewrite server URL to public API host
          KUBECONFIG=$(ssh -tt -o StrictHostKeyChecking=no \
            "${{ secrets.K3S_BASTION_USER }}@${{ secrets.K3S_BASTION }}" \
            "sudo cat /etc/rancher/k3s/k3s.yaml" \
            | sed "s|https://127.0.0.1:6443|https://$K3S_API_HOST:6443|")
          echo "$KUBECONFIG" > kubeconfig
          echo "::add-mask::kubeconfig"
          chmod 644 kubeconfig

      # ───────────────────────────────────────────────────────────────
      # 1. Rollout new pods FIRST.
      #    The build workflow pushes multiple tags; we use the
      #    build-number tag (build-NNN) which is stable and doesn't
      #    depend on SHA format matching between workflows.
      #    The pod mounts the persistent volume which has the correct
      #    common_site_config.json.
      # ───────────────────────────────────────────────────────────────
      - name: Rollout new bench Deployment
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          IMAGE_TAG=$IMAGE_NAME:build-${{ github.event.workflow_run.run_number }}
          echo "Updating to image: $IMAGE_TAG"
          kubectl set image deployment/frappe-bench \
            bench=$IMAGE_TAG \
            --namespace=default
          echo "Image updated. Waiting for rollout..."
          kubectl rollout status deployment/frappe-bench --namespace=default --timeout=600s
          echo "Rollout complete."

      # ───────────────────────────────────────────────────────────────
      # 2. Run database migration INSIDE a running pod.
      #    The pod already has the correct DB config from the mounted
      #    volume, so `bench migrate` connects to the right database.
      # ───────────────────────────────────────────────────────────────
      - name: Run database migration
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          echo "Waiting for at least one bench pod to be ready..."
          kubectl wait --for=condition=ready pod -l app=frappe-bench --namespace=default --timeout=120s
          POD=$(kubectl get pods -l app=frappe-bench --namespace=default -o name | head -1)
          echo "Running migration on $POD..."
          kubectl exec --namespace=default "$POD" -- bench --site all migrate
          echo "Database migration complete."

      # ───────────────────────────────────────────────────────────────
      # 3. Clear Frappe caches on all bench pods so the updated
      #    schema metadata is picked up immediately.
      # ───────────────────────────────────────────────────────────────
      - name: Clear Frappe caches
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          for pod in $(kubectl get pods -l app=frappe-bench --namespace=default -o name); do
            echo "Clearing cache on $pod..."
            kubectl exec --namespace=default "$pod" -- bench clear-cache || true
          done
          echo "Cache cleared on all pods."

      - name: Cleanup kubeconfig
        run: rm -f kubeconfig