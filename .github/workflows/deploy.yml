name: Deploy to k3s

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [master]

# Only trigger if docker-build succeeded
concurrency:
  group: k3s-deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/erpnext-scripts
  K3S_API_HOST: ${{ secrets.K3S_API_HOST }}

jobs:
  deploy:
    name: Deploy to on-premise k3s
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout scripts app
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure SSH to bastion
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K3S_SSH_KEY }}" > ~/.ssh/k3s_deploy_key
          chmod 600 ~/.ssh/k3s_deploy_key
          ssh-keyscan -H "${{ secrets.K3S_BASTION }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fetch kubeconfig via bastion
        run: |
          # SSH to bastion, sudo to read k3s.yaml, rewrite server URL to public API host
          KUBECONFIG=$(ssh -tt -o StrictHostKeyChecking=no \
            "${{ secrets.K3S_BASTION_USER }}@${{ secrets.K3S_BASTION }}" \
            "sudo cat /etc/rancher/k3s/k3s.yaml" \
            | sed "s|https://127.0.0.1:6443|https://$K3S_API_HOST:6443|")
          echo "$KUBECONFIG" > kubeconfig
          echo "::add-mask::kubeconfig"
          chmod 644 kubeconfig

      - name: Run database migrator
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl apply -f - <<'K8S_YAML'
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: frappe-migrator
            namespace: default
          spec:
            ttlSecondsAfterFinished: 600
            activeDeadlineSeconds: 900
            template:
              spec:
                restartPolicy: OnFailure
                initContainers:
                  - name: fix-custom-item
                    image: $IMAGE_NAME:sha-${{ github.event.workflow_run.head_sha }}
                    command: ["bench", "execute", "scripts.migrate.remove_custom_item_doctype", "--site", "dev.localhost"]
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: frappe-bench-db
                            key: mariadb
                      - name: SITES
                        value: "dev.localhost"
                containers:
                  - name: migrator
                    image: $IMAGE_NAME:sha-${{ github.event.workflow_run.head_sha }}
                    command: ["bench", "--site", "all", "migrate"]
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: frappe-bench-db
                            key: mariadb
                      - name: SITES
                        value: "dev.localhost"
                    resources:
                      requests:
                        memory: "256Mi"
                        cpu: "100m"
                      limits:
                        memory: "1Gi"
                        cpu: "1000m"
          K8S_YAML
          echo "Migrator Job submitted."

      - name: Wait for migrator to complete
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl wait --for=condition=complete job/frappe-migrator --namespace=default --timeout=900s
          kubectl logs job/frappe-migrator --namespace=default --tail=20

      - name: Force-sync scripts app fixtures to DB
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl apply -f - <<'K8S_YAML'
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: frappe-sync-scripts-fixtures
            namespace: default
          spec:
            ttlSecondsAfterFinished: 600
            activeDeadlineSeconds: 180
            template:
              spec:
                restartPolicy: OnFailure
                containers:
                  - name: sync-fixtures
                    image: $IMAGE_NAME:sha-${{ github.event.workflow_run.head_sha }}
                    command:
                      - python3
                      - -c
                      - |
                        import frappe
                        from frappe.utils.fixtures import sync_fixtures
                        frappe.init(site='dev.localhost')
                        frappe.connect()
                        # Force-delete stale Client Scripts so the fixture
                        # import always writes fresh copies. Without this,
                        # Frappe's timestamp comparison can skip the import
                        # if the DB row has a newer modified time.
                        frappe.db.delete('Client Script', {'name': 'Item-Print-Barcode'})
                        frappe.db.commit()
                        sync_fixtures('scripts')
                        frappe.db.commit()
                        print('Scripts app fixtures synced successfully.')
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: frappe-bench-db
                            key: mariadb
                      - name: SITES
                        value: "dev.localhost"
                    resources:
                      requests:
                        memory: "128Mi"
                        cpu: "100m"
                      limits:
                        memory: "512Mi"
                        cpu: "500m"
          K8S_YAML
          echo "Fixture sync job submitted."
          kubectl wait --for=condition=complete job/frappe-sync-scripts-fixtures --namespace=default --timeout=180s
          kubectl logs job/frappe-sync-scripts-fixtures --namespace=default

      - name: Rollout new bench Deployment
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl set image deployment/frappe-bench \
            bench=$IMAGE_NAME:sha-${{ github.event.workflow_run.head_sha }} \
            --namespace=default
          echo "Image updated. Waiting for rollout..."
          kubectl rollout status deployment/frappe-bench --namespace=default --timeout=600s
          echo "Rollout complete."

      - name: Clear Frappe caches on all bench pods
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          for pod in $(kubectl get pods -l app=frappe-bench --namespace=default -o name); do
            echo "Clearing cache on $pod..."
            kubectl exec --namespace=default "$pod" -- bench clear-cache || true
          done
          echo "Cache cleared on all pods."

      - name: Cleanup kubeconfig
        run: rm -f kubeconfig