name: Build and Push Docker Image

# Builds a production-ready Frappe/ERPNext + custom apps image and pushes
# it to Docker Hub. The image contains pre-built assets for ALL apps
# (frappe, erpnext, posawesome, scripts) so deployments do not need
# to run `bench build` at runtime.
#
# Triggers on:
#   - push to master
#   - merged PRs (also fire push events on master)
#   - manual workflow_dispatch with optional branch overrides
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      erpnext_branch:
        description: "ERPNext branch to include"
        required: false
        default: "version-16"
      frappe_branch:
        description: "Frappe branch to use as base"
        required: false
        default: "version-16"
      posawesome_branch:
        description: "POS Awesome branch to include"
        required: false
        default: "version-15"
      scripts_branch:
        description: "scripts app branch to include"
        required: false
        default: "master"

env:
  ERPNEXT_BRANCH: ${{ github.event.inputs.erpnext_branch || 'version-16' }}
  FRAPPE_BRANCH: ${{ github.event.inputs.frappe_branch || 'version-16' }}
  POSAWESOME_BRANCH: ${{ github.event.inputs.posawesome_branch || 'version-15' }}
  SCRIPTS_BRANCH: ${{ github.event.inputs.scripts_branch || github.ref_name }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/erpnext-scripts

jobs:
  build-and-push:
    name: Build and push production image
    runs-on: ubuntu-latest
    # `bench init` + `bench build --production` against the full Frappe/ERPNext
    # + custom apps tree can run for 25-35 minutes on a cold cache. Default
    # GitHub Actions job timeout is 360 minutes, but we set it explicitly here
    # for clarity and to make it easy to bump if needed.
    timeout-minutes: 90

    steps:
      - name: Checkout scripts app
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ env.ERPNEXT_BRANCH }}
            type=sha,prefix=sha-,format=short
            type=raw,value=build-${{ github.run_number }}

      - name: Render apps.json
        # Compose apps.json from the per-app branches (supports manual overrides
        # via workflow_dispatch and defaults to the current scripts branch).
        #
        # NOTE: do NOT list "frappe" here. `bench init --frappe-path=...` already
        # installs frappe, and a duplicate entry triggers
        # "A directory for the application 'frappe' already exists" and aborts
        # the build interactively (which fails in a non-TTY container).
        run: |
          cat > apps.json <<EOF
          [
            {
              "url": "https://github.com/frappe/erpnext",
              "branch": "$ERPNEXT_BRANCH"
            },
            {
              "url": "https://github.com/Gepsonka/posawesome",
              "branch": "$POSAWESOME_BRANCH"
            },
            {
              "url": "https://github.com/Gepsonka/scripts",
              "branch": "$SCRIPTS_BRANCH"
            }
          ]
          EOF
          echo "apps.json contents:"
          cat apps.json

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=${{ env.FRAPPE_BRANCH }}
            CACHE_BUST=${{ github.sha }}
          secret-files: |
            apps_json=./apps.json
          cache-from: type=gha,scope=${{ github.ref_name }}-${{ github.run_number }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-${{ github.run_number }}
      - name: Image summary
        run: |
          echo "Pushed tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  /'
