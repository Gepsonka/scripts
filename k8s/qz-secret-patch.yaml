# Patch to mount both QZ Tray secrets into the ERPNext backend pod.
#
# Apply with:
#   kubectl patch deployment erpnext-backend -n erpnext \
#     --patch-file k8s/qz-secret-patch.yaml
#
# Or merge into your existing Helm values / kustomization.

spec:
  template:
    spec:
      volumes:
        - name: qz-tray
          secret:
            secretName: qz-tray
            defaultMode: 0400   # read-only, owner only

      containers:
        - name: erpnext             # must match the container name in your deployment
          volumeMounts:
            - name: qz-tray
              mountPath: /run/secrets/qz_private_key
              subPath: qz_private_key
              readOnly: true
            - name: qz-tray
              mountPath: /run/secrets/qz_certificate
              subPath: qz_certificate
              readOnly: true
